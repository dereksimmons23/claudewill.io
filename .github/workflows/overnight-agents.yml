name: Overnight Agents

on:
  schedule:
    # 11:00 UTC = 5:00 AM CST (daily)
    - cron: '0 11 * * *'
    # 10:00 UTC = 4:00 AM CST Monday (weekly key rotation)
    - cron: '0 10 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  morning-edition:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build The Morning Edition
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
        run: node scripts/overnight/morning-edition.mjs
      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: morning-edition-report
          path: reports/morning-edition.md
          retention-days: 30

  housekeeping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Run housekeeping
        run: node scripts/overnight/housekeeping.mjs
      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: housekeeping-report
          path: reports/housekeeping.md
          retention-days: 30

  pulse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - name: Run daily pulse
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: node scripts/overnight/daily-pulse.mjs
      - name: Upload pulse
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pulse-report
          path: pulse.json
          retention-days: 30

  pipeline-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Run pipeline scan
        run: node scripts/overnight/pipeline-scan.mjs
      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pipeline-scan-report
          path: reports/pipeline-scan.md
          retention-days: 30

  spend-aggregation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Run Phase 2 Spend Aggregation
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
        run: npm install && node scripts/overnight/phase-2-spend-aggregation.mjs
      - name: Upload spend report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: spend-aggregation-report
          path: reports/
          retention-days: 30

  key-rotation:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 10 * * 1' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Run Phase 3 Key Rotation
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          NETLIFY_TOKEN: ${{ secrets.NETLIFY_TOKEN }}
        run: npm install && node scripts/overnight/phase-3-key-rotation.mjs
      - name: Upload rotation report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: key-rotation-report
          path: reports/
          retention-days: 30

  alerts:
    runs-on: ubuntu-latest
    needs: [spend-aggregation]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Run Phase 4 Alerts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SLACK_ALERTS_WEBHOOK: ${{ secrets.SLACK_ALERTS_WEBHOOK }}
        run: npm install && node scripts/overnight/phase-4-alerts.mjs
      - name: Upload alerts report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: alerts-report
          path: reports/
          retention-days: 30

  compile:
    runs-on: ubuntu-latest
    needs: [morning-edition, housekeeping, pulse, pipeline-scan, spend-aggregation, alerts]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Download morning edition report
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: morning-edition-report
          path: reports/

      - name: Download housekeeping report
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: housekeeping-report
          path: reports/

      - name: Download pulse
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: pulse-report
          path: ./

      - name: Download pipeline scan report
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: pipeline-scan-report
          path: reports/

      - name: Download spend aggregation report
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: spend-aggregation-report
          path: reports/

      - name: Compile kitchen-data.json
        run: node scripts/overnight/compile-kitchen-data.mjs

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add kitchen-data.json cw-current.json pulse.json spend-data.json reports/morning-edition.md
          git diff --cached --quiet || git commit -m "chore: morning edition + spend audit + kitchen-data from overnight agents"
          git push

      - name: Notify Derek via Telegram
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          JOB_STATUS: ${{ job.status }}
        run: |
          if [ "$JOB_STATUS" = "success" ]; then
            MSG="✅ *Overnight agents complete*%0A%0AMorning Edition compiled. Kitchen updated."
          else
            MSG="⚠️ *Overnight agents — ${JOB_STATUS}*%0A%0ACheck GitHub Actions for details."
          fi
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}&text=${MSG}&parse_mode=Markdown" > /dev/null
