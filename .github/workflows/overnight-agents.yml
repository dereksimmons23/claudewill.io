name: Overnight Agents

on:
  schedule:
    # 11:00 UTC = 5:00 AM CST
    - cron: '0 11 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  morning-edition:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build The Morning Edition
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
        run: node scripts/overnight/morning-edition.mjs
      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: morning-edition-report
          path: reports/morning-edition.md
          retention-days: 30

  housekeeping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Run housekeeping
        run: node scripts/overnight/housekeeping.mjs
      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: housekeeping-report
          path: reports/housekeeping.md
          retention-days: 30

  pulse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - name: Run daily pulse
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: node scripts/overnight/daily-pulse.mjs
      - name: Upload pulse
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pulse-report
          path: pulse.json
          retention-days: 30

  pipeline-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Run pipeline scan
        run: node scripts/overnight/pipeline-scan.mjs
      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pipeline-scan-report
          path: reports/pipeline-scan.md
          retention-days: 30

  compile:
    runs-on: ubuntu-latest
    needs: [morning-edition, housekeeping, pulse, pipeline-scan]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Download morning edition report
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: morning-edition-report
          path: reports/

      - name: Download housekeeping report
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: housekeeping-report
          path: reports/

      - name: Download pulse
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: pulse-report
          path: ./

      - name: Download pipeline scan report
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: pipeline-scan-report
          path: reports/

      - name: Compile kitchen-data.json
        run: node scripts/overnight/compile-kitchen-data.mjs

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add kitchen-data.json pulse.json reports/morning-edition.md
          git diff --cached --quiet || git commit -m "chore: morning edition + kitchen-data from overnight agents"
          git push
