[[headers]]
  for = "/dev/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=(), payment=(), usb=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; connect-src 'self' https://*.netlify.app https://*.netlify.com https://*.supabase.co https://api.anthropic.com https://www.google-analytics.com https://api.open-meteo.com; img-src 'self' data:; media-src 'self' blob:; font-src 'self' https://fonts.gstatic.com; frame-src https://www.youtube.com https://youtube.com https://player.vimeo.com https://vimeo.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self';"


