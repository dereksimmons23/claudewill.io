    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0a0e17;
            --text: #e2e8f0;
            --bright: #e5e9f0;
            --accent: #d4a84b;
            --dim: #4a5a70;
            --font: 'IBM Plex Mono', 'Courier New', Courier, monospace;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            font-size: 16px;
            overflow-x: hidden;
        }

        /* ── The North Star — centered hero trigger ─ */
        .porch-light {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            font-weight: 700;
            color: var(--accent);
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.75rem;
            min-height: 44px;
            min-width: 44px;
            margin: 2.5rem auto 0;
            line-height: 1;
            font-family: var(--font);
            z-index: 10;
            text-shadow:
                0 0 20px rgba(212, 168, 75, 0.6),
                0 0 50px rgba(212, 168, 75, 0.25);
            animation: glow 4s ease-in-out infinite;
        }

        .porch-light:hover {
            text-shadow:
                0 0 30px rgba(212, 168, 75, 0.9),
                0 0 65px rgba(212, 168, 75, 0.5),
                0 0 100px rgba(212, 168, 75, 0.2);
        }

        /* ── Mini corner trigger — appears on scroll ── */
        .porch-light-mini {
            position: fixed;
            top: 1.25rem;
            right: 1.25rem;
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--accent);
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.5rem;
            min-height: 44px;
            min-width: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
            font-family: var(--font);
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            text-shadow:
                0 0 12px rgba(212, 168, 75, 0.5),
                0 0 28px rgba(212, 168, 75, 0.2);
        }

        .porch-light-mini.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .porch-light-mini:hover {
            text-shadow:
                0 0 20px rgba(212, 168, 75, 0.8),
                0 0 45px rgba(212, 168, 75, 0.35);
        }

        @keyframes glow {
            0%, 100% {
                text-shadow:
                    0 0 20px rgba(212, 168, 75, 0.6),
                    0 0 50px rgba(212, 168, 75, 0.25);
            }
            50% {
                text-shadow:
                    0 0 28px rgba(212, 168, 75, 0.8),
                    0 0 65px rgba(212, 168, 75, 0.35),
                    0 0 90px rgba(212, 168, 75, 0.12);
            }
        }

        /* ── The Stars — full page canvas ─────── */
        #stars {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        /* ── Screen 1: The Porch at Night ──────── */
        .porch-night {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 1;
        }

        .name {
            will-change: transform, opacity;
        }

        /* Faint warm glow radiating from the centered asterisk */
        .porch-night::after {
            content: '';
            position: absolute;
            bottom: 10%;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(212, 168, 75, 0.05) 0%, transparent 55%);
            pointer-events: none;
        }

        .name {
            text-align: center;
            pointer-events: none;
        }

        .name-line {
            display: block;
            font-size: 18vw;
            font-weight: 700;
            color: var(--bright);
            line-height: 0.95;
            letter-spacing: -0.03em;
        }

        .name-period {
            opacity: 0;
            animation: arrive 0.6s ease-out 2.2s forwards;
            transition: opacity 0.4s;
        }

        .porch-tagline {
            margin-top: 2rem;
            font-size: 0.9rem;
            color: var(--dim);
            letter-spacing: 0.04em;
            text-align: center;
            max-width: 36ch;
            line-height: 1.5;
            opacity: 0;
            animation: arrive 1s ease-out 3s forwards;
        }

        /* ── The Sky — drifting essay titles ───── */
        .sky {
            position: relative;
            z-index: 1;
            min-height: 80vh;
            padding: 4rem 2rem;
        }

        .sky-writing {
            position: relative;
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            height: 70vh;
        }

        .sky-writing a {
            position: absolute;
            color: rgba(226, 232, 240, 0.3);
            text-decoration: none;
            font-family: var(--font);
            transition: color 0.8s ease, text-shadow 0.8s ease;
            white-space: nowrap;
            will-change: transform;
        }

        .sky-writing a:visited { color: rgba(226, 232, 240, 0.3); }

        .sky-writing a:hover {
            color: var(--accent) !important;
            text-shadow: 0 0 20px rgba(212, 168, 75, 0.3);
        }

        .sky-writing a:focus-visible {
            color: var(--accent) !important;
        }

/* ── Footer ───────────────────────────── */
        .site-footer {
            position: relative;
            z-index: 2;
            padding: 4rem 2rem 2rem;
            text-align: center;
            font-size: 0.75rem;
            color: var(--dim);
        }

        .footer-identity {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--bright);
            letter-spacing: 0.06em;
            margin-bottom: 1.5rem;
        }

        .footer-subscribe {
            margin: 1.5rem auto;
            max-width: 400px;
        }

        .site-footer a {
            color: var(--dim);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            min-height: 44px;
            padding: 0.25rem 0.5rem;
        }

        .site-footer a:hover { color: var(--bright); }
        .site-footer a:visited { color: var(--dim); }
        .footer-note + .footer-note { margin-top: 0.25rem; }

        .book-countdown {
            display: block;
            color: var(--accent);
            text-decoration: none;
            letter-spacing: 0.08em;
            font-size: 0.8rem;
            margin-top: 1rem;
            font-variant-numeric: tabular-nums;
        }
        .book-countdown:hover { text-shadow: 0 0 10px rgba(212, 168, 75, 0.3); }
        .book-countdown:visited { color: var(--accent); }

        /* ── Entrance ─────────────────────────── */
        .name-claude,
        .name-will {
            opacity: 0;
        }

        .name-claude { animation: arrive 1.2s ease-out 0.3s forwards; }
        .name-will   { animation: arrive 1.2s ease-out 1.2s forwards; }

        @keyframes arrive {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* ── Accessibility ────────────────────── */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border-width: 0;
        }

        button:focus-visible,
        a:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }

        button:focus:not(:focus-visible) { outline: none; }

        /* ── Mobile ───────────────────────────── */
        @media (max-width: 600px) {
            .name-line { font-size: 22vw; }
            .porch-night { padding: 1.5rem; }
            .porch-tagline { font-size: 0.85rem; max-width: 28ch; }
            .sky-writing a { font-size: 0.875rem !important; } /* 14px floor */
            .porch-light { font-size: 3rem; margin-top: 2rem; }
            .porch-light-mini { top: 0.75rem; right: 0.75rem; }
            .site-footer { font-size: 0.875rem; }
            .book-countdown { font-size: 0.875rem; }
            .footer-identity { font-size: 1rem; }
        }

        /* ── Reduced motion ───────────────────── */
        @media (prefers-reduced-motion: reduce) {
            .name-claude,
            .name-will,
            .name-period,
            .porch-tagline {
                opacity: 1;
                animation: none;
            }
            #stars { display: none; }
            .porch-light,
            .porch-light-mini {
                animation: none;
                text-shadow:
                    0 0 15px rgba(212, 168, 75, 0.5),
                    0 0 35px rgba(212, 168, 75, 0.2);
            }
            .sky-writing a { transition: none; }
        }
    </style>
</head>

    <script>
        // ── Drifting stars (essay/dispatch titles) ────────
        (function() {
            var sky = document.getElementById('sky-writing');
            if (!sky) return;

            var sizes = [0.75, 0.8, 0.85, 0.9, 0.95, 1.0, 1.05, 1.15];

            function shuffle(arr) {
                var a = arr.slice();
                for (var i = a.length - 1; i > 0; i--) {
                    var j = Math.floor(Math.random() * (i + 1));
                    var t = a[i]; a[i] = a[j]; a[j] = t;
                }
                return a;
            }

            function scatter(pool, count) {
                var picked = shuffle(pool).slice(0, count);
                var step = 90 / count;

                picked.forEach(function(star, i) {
                    var a = document.createElement('a');
                    a.href = star.href;
                    a.target = '_blank';
                    a.rel = 'noopener';
                    a.textContent = star.text;

                    var top = (i * step) + (Math.random() * step * 0.6);
                    var len = star.text.length;
                    var margin = Math.min(40, len * 2);
                    var left = margin + Math.random() * (100 - margin * 2);
                    var size = sizes[Math.floor(Math.random() * sizes.length)];

                    a.style.top = top + '%';
                    a.style.left = left + '%';
                    a.style.transform = 'translateX(-50%)';
                    a.style.fontSize = size + 'rem';

                    // Each star gets a unique drift — slow, subtle
                    var driftX = (Math.random() - 0.5) * 20; // px total drift (tighter)
                    var driftY = (Math.random() - 0.5) * 10;
                    var duration = 40 + Math.random() * 40; // 40-80s (slower)
                    var delay = Math.random() * -60; // stagger starts

                    a.style.animation = 'drift ' + duration + 's ease-in-out ' + delay + 's infinite alternate';
                    a.style.setProperty('--drift-x', driftX + 'px');
                    a.style.setProperty('--drift-y', driftY + 'px');

                    sky.appendChild(a);
                });
            }

            // Inject drift keyframes once
            var styleEl = document.createElement('style');
            styleEl.textContent = '@keyframes drift { 0% { transform: translateX(-50%) translate(0, 0); } 100% { transform: translateX(-50%) translate(var(--drift-x), var(--drift-y)); } }';
            document.head.appendChild(styleEl);

            fetch('/stars.json').then(function(r) { return r.json(); }).then(function(data) {
                scatter(data.pool, data.count || 15);
            }).catch(function() {
                scatter([
                    { text: 'The Jar', href: '/being-claude/the-jar/' },
                    { text: 'Being Claude', href: '/being-claude/being-claude/' },
                    { text: 'Loss Function', href: '/being-claude/the-loss-function/' },
                    { text: 'truth over comfort', href: '/standard' },
                    { text: 'lightning/bug', href: '/lightning/bug' },
                    { text: 'the book', href: '/book' },
                    { text: 'derek', href: '/derek' },
                    { text: 'The Dimmer Switch', href: '/being-claude/the-dimmer-switch/' },
                    { text: 'Three Rooms', href: '/being-claude/three-rooms/' },
                    { text: 'keep going', href: '/' }
                ], 10);
            });
        })();
    </script>

    <script>
        // ── Star field canvas ──────────────────────────
        (function() {
            var c = document.getElementById('stars');
            var ctx = c.getContext('2d');
            var stars = [];
            var count = 220;
            var w, h;

            function resize() {
                w = c.width = window.innerWidth;
                h = c.height = window.innerHeight;
            }

            function seed() {
                stars = [];
                for (var i = 0; i < count; i++) {
                    stars.push({
                        x: Math.random() * w,
                        y: Math.random() * h,
                        r: Math.random() * 1.6 + 0.3,
                        base: Math.random() * 0.5 + 0.1,
                        amp: Math.random() * 0.35,
                        speed: Math.random() * 0.0015 + 0.0003,
                        phase: Math.random() * Math.PI * 2,
                        dx: (Math.random() - 0.5) * 0.008,
                        dy: (Math.random() - 0.5) * 0.005
                    });
                }
            }

            function draw(t) {
                ctx.clearRect(0, 0, w, h);
                for (var i = 0; i < count; i++) {
                    var s = stars[i];
                    var flicker = Math.sin(t * s.speed + s.phase);
                    var a = s.base + flicker * s.amp;

                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.r, 0, 6.2832);
                    ctx.fillStyle = 'rgba(220,210,190,' + a + ')';
                    ctx.fill();

                    if (s.r > 1.2 && a > 0.35) {
                        ctx.beginPath();
                        ctx.arc(s.x, s.y, s.r * 2.5, 0, 6.2832);
                        ctx.fillStyle = 'rgba(220,210,190,' + (a * 0.12) + ')';
                        ctx.fill();
                    }

                    s.x += s.dx;
                    s.y += s.dy;
                    if (s.x < -2) s.x = w + 2;
                    if (s.x > w + 2) s.x = -2;
                    if (s.y < -2) s.y = h + 2;
                    if (s.y > h + 2) s.y = -2;
                }
                requestAnimationFrame(draw);
            }

            var prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
            if (!prefersReduced) {
                resize();
                seed();
                requestAnimationFrame(draw);

                window.addEventListener('resize', function() {
                    resize();
                    seed();
                });
            }
        })();
    </script>

    <script>
        // ── Scroll recede — wordmark shrinks into the sky ──
        (function() {
            var name = document.querySelector('.name');
            var tagline = document.querySelector('.porch-tagline');
            if (!name) return;

            var prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
            if (prefersReduced) return;

            var ticking = false;

            window.addEventListener('scroll', function() {
                if (!ticking) {
                    requestAnimationFrame(function() {
                        var scrollY = window.scrollY;
                        var vh = window.innerHeight;
                        var progress = Math.min(1, scrollY / (vh * 0.6));

                        var scale = 1 - (progress * 0.6); // shrinks to 40%
                        var opacity = 1 - (progress * 0.8); // fades to 20%

                        name.style.transform = 'scale(' + Math.max(0.4, scale) + ')';
                        name.style.opacity = Math.max(0.15, opacity);

                        if (tagline) {
                            tagline.style.opacity = Math.max(0, 1 - progress * 1.5);
                        }

                        ticking = false;
                    });
                    ticking = true;
                }
            });
        })();
    </script>

    <script>
        // ── Mini nav trigger — shows when main asterisk leaves viewport ──
        (function() {
            var porch = document.getElementById('porch');
            var mini = document.querySelector('.porch-light-mini');
            if (!porch || !mini) return;
            var observer = new IntersectionObserver(function(entries) {
                var visible = entries[0].isIntersecting;
                mini.classList.toggle('visible', !visible);
                mini.setAttribute('aria-hidden', visible ? 'true' : 'false');
            }, { threshold: 0.1 });
            observer.observe(porch);
        })();
    </script>

    <script>
    (function() {
      var el = document.getElementById('book-countdown');
      if (!el) return;
      var bookDate = new Date('2026-06-28T00:00:00').getTime();
      function tick() {
        var now = Date.now();
        var diff = bookDate - now;
        if (diff <= 0) { el.textContent = 'the book is here'; return; }
        var days = Math.floor(diff / 86400000);
        var hours = Math.floor((diff % 86400000) / 3600000);
        var mins = Math.floor((diff % 3600000) / 60000);
        var secs = Math.floor((diff % 60000) / 1000);
        el.textContent = days + 'd ' + hours + 'h ' + mins + 'm ' + secs + 's';
      }
      tick();
      setInterval(tick, 1000);
    })();
    </script>
