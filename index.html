    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --sky: #080f1d;
            --star: #d4a84b;
            --light: #e5e7eb;
            --dim: #6b7280;
            --faint: #374151;
            --font: 'IBM Plex Mono', 'Courier New', Courier, monospace;
        }

        body {
            font-family: var(--font);
            background: var(--sky);
            color: var(--light);
            line-height: 1.6;
            font-size: 16px;
            overflow-x: hidden;
        }

        /* ── Header ──────────────────────────── */
        .sky-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .sky-name {
            font-family: var(--font);
            font-size: 1rem;
            font-weight: 600;
            color: var(--light);
            text-decoration: none;
            letter-spacing: 0.02em;
        }

        .sky-name:visited { color: var(--light); }
        .sky-name:hover { text-decoration: none; color: var(--star); }

        .sky-menu {
            font-family: var(--font);
            font-size: 0.8rem;
            color: var(--dim);
            background: none;
            border: none;
            cursor: pointer;
            letter-spacing: 0.04em;
        }

        .sky-menu:hover { color: var(--light); }

        /* ── The Sky ─────────────────────────── */
        .sky {
            position: relative;
            min-height: 100vh;
            min-height: 100svh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Background star field */
        .sky::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.12), transparent),
                radial-gradient(1px 1px at 85% 8%, rgba(255,255,255,0.08), transparent),
                radial-gradient(1.5px 1.5px at 45% 92%, rgba(255,255,255,0.1), transparent),
                radial-gradient(1px 1px at 72% 45%, rgba(255,255,255,0.06), transparent),
                radial-gradient(1px 1px at 28% 78%, rgba(255,255,255,0.09), transparent),
                radial-gradient(1.5px 1.5px at 92% 68%, rgba(255,255,255,0.07), transparent),
                radial-gradient(1px 1px at 15% 55%, rgba(255,255,255,0.05), transparent),
                radial-gradient(1px 1px at 60% 12%, rgba(255,255,255,0.11), transparent),
                radial-gradient(1px 1px at 38% 35%, rgba(255,255,255,0.04), transparent),
                radial-gradient(1px 1px at 82% 82%, rgba(255,255,255,0.08), transparent),
                radial-gradient(1px 1px at 5% 90%, rgba(255,255,255,0.06), transparent),
                radial-gradient(1px 1px at 95% 25%, rgba(255,255,255,0.09), transparent),
                radial-gradient(1px 1px at 52% 50%, rgba(255,255,255,0.03), transparent),
                radial-gradient(1px 1px at 18% 42%, rgba(255,255,255,0.07), transparent),
                radial-gradient(1px 1px at 67% 72%, rgba(255,255,255,0.05), transparent),
                radial-gradient(1px 1px at 33% 5%, rgba(255,255,255,0.1), transparent),
                radial-gradient(1px 1px at 78% 58%, rgba(255,255,255,0.04), transparent),
                radial-gradient(1px 1px at 42% 88%, rgba(255,255,255,0.07), transparent),
                radial-gradient(1px 1px at 88% 15%, rgba(255,255,255,0.06), transparent),
                radial-gradient(1px 1px at 7% 70%, rgba(255,255,255,0.08), transparent);
            pointer-events: none;
        }

        /* Constellation SVG lines */
        .constellation-svg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .constellation-svg line {
            stroke: var(--star);
            stroke-opacity: 0.12;
            stroke-width: 0.15;
        }

        /* ── Central Star ────────────────────── */
        .star-center {
            position: absolute;
            left: 50%;
            top: 40%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
        }

        .porch-light {
            font-family: var(--font);
            font-size: 5rem;
            font-weight: 700;
            color: var(--star);
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            line-height: 1;
            text-shadow:
                0 0 20px rgba(212, 168, 75, 0.6),
                0 0 60px rgba(212, 168, 75, 0.3),
                0 0 100px rgba(212, 168, 75, 0.1);
            animation: breathe 4s ease-in-out infinite;
            transition: text-shadow 0.3s;
        }

        .porch-light:hover {
            text-shadow:
                0 0 30px rgba(212, 168, 75, 0.8),
                0 0 80px rgba(212, 168, 75, 0.4),
                0 0 120px rgba(212, 168, 75, 0.15);
        }

        @keyframes breathe {
            0%, 100% { opacity: 0.9; }
            50% { opacity: 1; }
        }

        .star-wordmark {
            font-family: var(--font);
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--light);
            letter-spacing: 0.06em;
            margin-top: 0.25rem;
            opacity: 0.9;
        }

        .star-typewriter {
            font-family: var(--font);
            font-size: 0.85rem;
            color: var(--dim);
            letter-spacing: 0.02em;
            margin-top: 0.75rem;
            min-height: 1.5em;
        }

        .typewriter-cursor {
            display: inline-block;
            width: 0.5em;
            height: 1em;
            background: var(--dim);
            margin-left: 2px;
            vertical-align: text-bottom;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* ── Satellite Stars ─────────────────── */
        .star {
            position: absolute;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem;
            z-index: 5;
            transition: transform 0.2s;
        }

        .star:hover { transform: scale(1.05); }

        .star-dot {
            font-size: 1.8rem;
            color: var(--star);
            line-height: 1;
            text-shadow: 0 0 8px rgba(212, 168, 75, 0.4);
            animation: twinkle var(--dur, 4s) ease-in-out infinite;
            animation-delay: var(--del, 0s);
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }

        .star-name {
            font-family: var(--font);
            font-size: 0.85rem;
            color: var(--dim);
            letter-spacing: 0.04em;
            transition: color 0.2s;
        }

        .star:hover .star-name { color: var(--star); }
        .star:hover .star-dot { text-shadow: 0 0 16px rgba(212, 168, 75, 0.7); }
        .star:visited .star-name { color: var(--dim); }
        .star:visited:hover .star-name { color: var(--star); }

        /* Star positions */
        .star-derek { left: 22%; top: 25%; }
        .star-standard { left: 72%; top: 22%; }
        .star-story { left: 18%; top: 65%; }
        .star-claude { left: 50%; top: 72%; transform: translateX(-50%); }
        .star-kitchen { left: 74%; top: 60%; }

        /* ── Footer ──────────────────────────── */
        .sky-footer {
            padding: 2rem 2rem;
            text-align: center;
            font-size: 0.75rem;
            color: var(--faint);
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .sky-footer a {
            color: var(--dim);
            text-decoration: none;
        }

        .sky-footer a:hover { color: var(--light); }
        .sky-footer a:visited { color: var(--dim); }
        .sky-footer .hw { color: var(--star); }
        .footer-note + .footer-note { margin-top: 0.25rem; }

        /* ── Utilities ───────────────────────── */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border-width: 0;
        }

        button:focus-visible,
        a:focus-visible {
            outline: 2px solid var(--star);
            outline-offset: 2px;
        }

        button:focus:not(:focus-visible) { outline: none; }

        /* ── Mobile ──────────────────────────── */
        @media (max-width: 700px) {
            .sky-header { padding: 1rem 1.25rem; }

            .sky {
                flex-direction: column;
                padding: 5rem 1.5rem 2rem;
                justify-content: center;
                gap: 0.25rem;
            }

            .constellation-svg { display: none; }

            .star-center {
                position: relative;
                left: auto;
                top: auto;
                transform: none;
                margin-bottom: 2rem;
            }

            .porch-light { font-size: 3.5rem; }
            .star-wordmark { font-size: 1.1rem; }

            .star {
                position: relative;
                left: auto !important;
                top: auto !important;
                transform: none !important;
                justify-content: center;
            }

            .star-dot { font-size: 1.4rem; }
            .star-name { font-size: 0.9rem; }
            .sky-footer { padding: 1.5rem 1rem; }
        }

        /* ── Reduced motion ──────────────────── */
        @media (prefers-reduced-motion: reduce) {
            .typewriter-cursor { animation: none; opacity: 1; }
            .porch-light { animation: none; opacity: 1; }
            .star-dot { animation: none; opacity: 0.85; }
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>

    <!-- Typewriter -->
    <script>
        var phrases = ['listen first', 'speak directly', 'find a way', 'keep going'];
        var pi = 0, ci = 0, del = false;
        var el = document.getElementById('typed-text');
        function type() {
            if (!el) return;
            var w = phrases[pi];
            if (!del) {
                ci++;
                el.textContent = w.substring(0, ci);
                if (ci === w.length) { setTimeout(function() { del = true; type(); }, 2500); return; }
                setTimeout(type, 80);
            } else {
                ci--;
                el.textContent = w.substring(0, ci);
                if (ci === 0) { del = false; pi = (pi + 1) % phrases.length; setTimeout(type, 400); return; }
                setTimeout(type, 40);
            }
        }
        if (el) setTimeout(type, 800);
    </script>

    <!-- Porch light opens CW chat -->
    <script>
        document.getElementById('porch-light').addEventListener('click', function() {
            if (window.CW_PORCH && window.CW_PORCH.open) window.CW_PORCH.open();
        });
    </script>
