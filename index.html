    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #080c14;
            --text: #e2e8f0;
            --bright: #e5e9f0;
            --accent: #d4a84b;
            --dim: #4a5a70;
            --font: 'IBM Plex Mono', 'Courier New', Courier, monospace;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
        }

        /* ── Canvas: aurora behind stars ── */
        #aurora,
        #stars {
            position: fixed;
            inset: 0;
            pointer-events: none;
        }
        #aurora { z-index: 0; }
        #stars  { z-index: 1; }

        /* ── Constellation SVG (injected by JS) ── */
        #sky-map {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 3;
            pointer-events: none; /* stars re-enable individually */
            overflow: visible;
        }

        /* Lines — invisible at rest */
        .c-lines line {
            stroke: rgba(200, 215, 240, 0);
            stroke-width: 0.6;
            transition: stroke 0.5s ease;
        }

        /* Invisible hit zone */
        .c-hit {
            fill: transparent;
            stroke: none;
        }

        /* Visible dot */
        .c-dot {
            fill: rgba(226, 232, 240, 0.22);
            transition: fill 0.3s ease;
        }

        .c-star.hub .c-dot {
            fill: rgba(212, 168, 75, 0.4);
            transition: fill 0.3s ease, r 0.3s ease;
        }

        /* Labels */
        .c-label {
            font-family: var(--font);
            letter-spacing: 0.18em;
            text-transform: lowercase;
            pointer-events: none;
            user-select: none;
            transition: fill 0.35s ease, opacity 0.35s ease;
        }

        /* Hub labels: faint gold at rest — discoverable */
        .c-star.hub .c-label {
            fill: rgba(212, 168, 75, 0.28);
            font-size: clamp(9px, 1.1vw, 11px);
        }

        /* Content star labels: hidden at rest */
        .c-star:not(.hub) .c-label {
            fill: rgba(212, 168, 75, 0);
            font-size: clamp(8px, 1vw, 10px);
        }

        /* Individual star hover */
        .c-star {
            pointer-events: all;
            cursor: pointer;
        }

        .c-star:hover .c-dot,
        .c-star:focus-visible .c-dot {
            fill: rgba(226, 232, 240, 0.9);
        }

        .c-star.hub:hover .c-dot,
        .c-star.hub:focus-visible .c-dot {
            fill: rgba(212, 168, 75, 0.95);
        }

        .c-star:hover .c-label,
        .c-star:focus-visible .c-label {
            fill: rgba(212, 168, 75, 0.9);
        }

        /* Active constellation — hub hovered, full constellation lights up */
        .constellation.active .c-lines line {
            stroke: rgba(200, 215, 240, 0.16);
        }

        .constellation.active .c-dot {
            fill: rgba(226, 232, 240, 0.5);
        }

        .constellation.active .hub .c-dot {
            fill: rgba(212, 168, 75, 0.8);
        }

        .constellation.active .c-label {
            fill: rgba(212, 168, 75, 0.55);
        }

        .constellation.active .hub .c-label {
            fill: rgba(212, 168, 75, 0.95);
        }

        /* Focus ring on SVG links */
        .c-star:focus-visible {
            outline: none;
        }
        .c-star:focus-visible .c-dot {
            stroke: rgba(212, 168, 75, 0.6);
            stroke-width: 2;
        }

        /* Touch devices: show all labels (no hover) */
        @media (hover: none) {
            .c-star:not(.hub) .c-label { fill: rgba(212, 168, 75, 0.4); }
            .c-star.hub .c-label { fill: rgba(212, 168, 75, 0.7); }
            .c-dot { fill: rgba(226, 232, 240, 0.45); }
            .c-star.hub .c-dot { fill: rgba(212, 168, 75, 0.65); }
        }

        /* ── Stage: centered asterisk + wordmark ── */
        .stage {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 4;
            pointer-events: none; /* transparent — stars underneath are clickable */
            padding-bottom: 4vh;  /* nudge up slightly from center */
        }

        /* ── North star — the asterisk ── */
        .asterisk-center {
            pointer-events: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(3.2rem, 7vw, 5.5rem);
            font-weight: 700;
            color: var(--accent);
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.75rem;
            min-height: 44px;
            min-width: 44px;
            line-height: 1;
            font-family: var(--font);
            text-shadow:
                0 0 22px rgba(212, 168, 75, 0.8),
                0 0 55px rgba(212, 168, 75, 0.4),
                0 0 110px rgba(212, 168, 75, 0.15);
            animation: northGlow 5s ease-in-out infinite;
            margin-bottom: 0.6rem;
        }

        .asterisk-center:hover {
            text-shadow:
                0 0 32px rgba(212, 168, 75, 1),
                0 0 75px rgba(212, 168, 75, 0.6),
                0 0 130px rgba(212, 168, 75, 0.25);
        }

        @keyframes northGlow {
            0%, 100% {
                text-shadow:
                    0 0 22px rgba(212, 168, 75, 0.8),
                    0 0 55px rgba(212, 168, 75, 0.4),
                    0 0 110px rgba(212, 168, 75, 0.15);
            }
            50% {
                text-shadow:
                    0 0 30px rgba(212, 168, 75, 1),
                    0 0 70px rgba(212, 168, 75, 0.55),
                    0 0 130px rgba(212, 168, 75, 0.2);
            }
        }

        /* ── Wordmark — dim signature below the asterisk ── */
        .wordmark-sig {
            font-family: var(--font);
            font-size: clamp(1rem, 2.5vw, 1.8rem);
            font-weight: 700;
            color: var(--bright);
            letter-spacing: -0.02em;
            opacity: 0;
            animation: sigFade 2.5s ease-out 1.2s forwards;
            pointer-events: none;
            user-select: none;
        }

        @keyframes sigFade {
            from { opacity: 0; }
            to   { opacity: 0.1; }
        }

        /* ── Footer ── */
        .site-footer {
            flex-shrink: 0;
            padding: 0.75rem 2rem 1rem;
            text-align: center;
            font-size: 0.68rem;
            color: var(--dim);
            letter-spacing: 0.04em;
            position: relative;
            z-index: 5;
        }

        .site-footer a {
            color: var(--dim);
            text-decoration: none;
            padding: 0.2rem 0.3rem;
            transition: color 0.2s;
        }

        .site-footer a:hover { color: var(--bright); }
        .site-footer a:visited { color: var(--dim); }

        /* ── Accessibility ── */
        .sr-only {
            position: absolute;
            width: 1px; height: 1px;
            padding: 0; margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border-width: 0;
        }

        button:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 3px;
        }
        button:focus:not(:focus-visible) { outline: none; }

        /* ── Mobile ── */
        @media (max-width: 600px) {
            .asterisk-center { font-size: 3.2rem; }
            .site-footer { padding: 0.6rem 1rem 0.875rem; }
        }

        /* ── Reduced motion ── */
        @media (prefers-reduced-motion: reduce) {
            .asterisk-center { animation: none; text-shadow: 0 0 18px rgba(212, 168, 75, 0.6); }
            .wordmark-sig { opacity: 0.1; animation: none; }
            #aurora, #stars { display: none; }
            .c-lines line { transition: none; }
            .c-dot, .c-label, .c-star.hub .c-dot, .c-star.hub .c-label { transition: none; }
        }

        /* ── Two-mode homepage ───────────────────────────────────── */
        .simple-home {
            position: fixed;
            inset: 0;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding-bottom: 6vh;
            animation: sfade 1.2s ease-out both;
            transition: opacity 0.5s ease;
        }
        @keyframes sfade { from { opacity: 0; } to { opacity: 1; } }

        body.game-mode .simple-home {
            opacity: 0;
            pointer-events: none;
        }

        /* Hide game layer in simple mode */
        body:not(.game-mode) #sky-map,
        body:not(.game-mode) .stage,
        body:not(.game-mode) .asterisk-center {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        body.game-mode #sky-map,
        body.game-mode .stage {
            opacity: 1;
            visibility: visible;
            transition: opacity 0.5s ease;
        }

        .simple-wordmark {
            font-family: var(--font);
            font-size: clamp(2.2rem, 5vw, 4rem);
            font-weight: 700;
            color: var(--bright);
            letter-spacing: -0.02em;
            margin-bottom: 0.6rem;
        }
        .simple-tagline {
            font-family: var(--font);
            font-size: clamp(0.62rem, 1.1vw, 0.78rem);
            color: var(--dim);
            letter-spacing: 0.2em;
            margin-bottom: 2.8rem;
        }
        .simple-nav {
            display: flex;
            gap: clamp(1rem, 3.5vw, 2.5rem);
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 2.2rem;
        }
        .simple-nav a {
            font-family: var(--font);
            font-size: clamp(0.78rem, 1.4vw, 0.9rem);
            letter-spacing: 0.16em;
            color: var(--text);
            text-decoration: none;
            opacity: 0.55;
            transition: opacity 0.2s, color 0.2s;
            padding: 0.45rem 0.15rem;
            min-height: 44px;
            display: inline-flex;
            align-items: center;
        }
        .simple-nav a:hover { opacity: 1; color: var(--accent); }
        .simple-cw-btn {
            background: none;
            border: 1px solid rgba(212, 168, 75, 0.3);
            color: var(--accent);
            font-family: var(--font);
            font-size: 0.8rem;
            letter-spacing: 0.12em;
            padding: 0.5rem 1.8rem;
            cursor: pointer;
            transition: border-color 0.2s, color 0.2s;
            margin-bottom: 3rem;
        }
        .simple-cw-btn:hover { border-color: rgba(212, 168, 75, 0.7); color: var(--bright); }
        .simple-explore-btn {
            background: none;
            border: none;
            color: var(--dim);
            font-family: var(--font);
            font-size: 0.6rem;
            letter-spacing: 0.22em;
            cursor: pointer;
            opacity: 0.35;
            transition: opacity 0.2s;
            padding: 0.4rem;
        }
        .simple-explore-btn:hover { opacity: 0.85; }
        .back-simple-btn {
            position: fixed;
            bottom: 3rem;
            left: 50%;
            transform: translateX(-50%);
            background: none;
            border: none;
            color: var(--dim);
            font-family: var(--font);
            font-size: 0.6rem;
            letter-spacing: 0.2em;
            cursor: pointer;
            opacity: 0;
            pointer-events: none;
            z-index: 20;
            transition: opacity 0.35s;
            padding: 0.4rem;
            white-space: nowrap;
        }
        body.game-mode .back-simple-btn { opacity: 0.3; pointer-events: all; }
        body.game-mode .back-simple-btn:hover { opacity: 0.75; }

        @media (max-width: 600px) {
            .simple-nav { gap: 0.8rem; }
            .simple-wordmark { font-size: 2rem; }
        }
    </style>
</head>

    <script>
        // ── Aurora borealis — cinematic curtains ───────────────────
        (function() {
            var c = document.getElementById('aurora');
            if (!c) return;
            var ctx = c.getContext('2d');
            var w, h;

            function resize() { w = c.width = window.innerWidth; h = c.height = window.innerHeight; }

            var bands = [
                { yRatio: 0.10, amp: 42, wl: 520, phase: 0,   color: '0, 200, 160',   alpha: 0.078, speed: 0.00018 },
                { yRatio: 0.20, amp: 55, wl: 680, phase: 2.1, color: '123, 104, 238', alpha: 0.062, speed: 0.00012 },
                { yRatio: 0.07, amp: 26, wl: 380, phase: 4.5, color: '0, 229, 255',   alpha: 0.038, speed: 0.00022 },
                { yRatio: 0.30, amp: 32, wl: 800, phase: 1.3, color: '80, 60, 180',   alpha: 0.034, speed: 0.00008 }
            ];

            function drawBand(b, t) {
                var y0 = h * b.yRatio;
                var bandH = b.amp * 4.2;
                ctx.beginPath();
                ctx.moveTo(0, y0);
                for (var x = 0; x <= w; x += 5) {
                    ctx.lineTo(x, y0 + Math.sin((x / b.wl) + b.phase + t * b.speed) * b.amp);
                }
                ctx.lineTo(w, y0 + bandH);
                ctx.lineTo(0, y0 + bandH);
                ctx.closePath();
                var grad = ctx.createLinearGradient(0, y0 - b.amp, 0, y0 + bandH);
                grad.addColorStop(0,    'rgba(' + b.color + ', 0)');
                grad.addColorStop(0.25, 'rgba(' + b.color + ', ' + b.alpha + ')');
                grad.addColorStop(0.65, 'rgba(' + b.color + ', ' + (b.alpha * 0.5) + ')');
                grad.addColorStop(1,    'rgba(' + b.color + ', 0)');
                ctx.fillStyle = grad;
                ctx.fill();
            }

            function draw(t) {
                ctx.clearRect(0, 0, w, h);
                for (var i = 0; i < bands.length; i++) drawBand(bands[i], t);
                requestAnimationFrame(draw);
            }

            if (!window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
                resize();
                requestAnimationFrame(draw);
                window.addEventListener('resize', resize);
            }
        })();
    </script>

    <script>
        // ── Star field — drifting stars, constellation lines, shooting stars ──
        (function() {
            var c = document.getElementById('stars');
            if (!c) return;
            var ctx = c.getContext('2d');
            var stars = [], shooters = [], connections = [];
            var COUNT = 300, w, h;

            function resize() { w = c.width = window.innerWidth; h = c.height = window.innerHeight; }

            function seed() {
                stars = [];
                for (var i = 0; i < COUNT; i++) {
                    stars.push({
                        x: Math.random() * w, y: Math.random() * h,
                        r: Math.random() * 1.6 + 0.2,
                        base: Math.random() * 0.42 + 0.07,
                        amp: Math.random() * 0.28,
                        speed: Math.random() * 0.0012 + 0.0002,
                        phase: Math.random() * Math.PI * 2,
                        dx: (Math.random() - 0.5) * 0.006,
                        dy: (Math.random() - 0.5) * 0.004
                    });
                }
                buildConnections();
            }

            function buildConnections() {
                connections = [];
                var maxDist = 135, limit = 20;
                for (var i = 0; i < stars.length && connections.length < limit; i++) {
                    for (var j = i + 1; j < stars.length && connections.length < limit; j++) {
                        var dx = stars[i].x - stars[j].x, dy = stars[i].y - stars[j].y;
                        if (Math.sqrt(dx * dx + dy * dy) < maxDist) connections.push([i, j]);
                    }
                }
            }

            function maybeShoot() {
                if (shooters.length < 2 && Math.random() < 0.0007) {
                    var fromRight = Math.random() > 0.5;
                    shooters.push({
                        x: fromRight ? w * 0.75 + Math.random() * w * 0.25 : Math.random() * w * 0.3,
                        y: Math.random() * h * 0.42,
                        vx: fromRight ? -(3 + Math.random() * 5) : (3 + Math.random() * 5),
                        vy: 1.2 + Math.random() * 2.2,
                        alpha: 0.85,
                        len: 65 + Math.random() * 95,
                        decay: 0.014 + Math.random() * 0.012
                    });
                }
            }

            function draw(t) {
                ctx.clearRect(0, 0, w, h);

                // Constellation lines (canvas background stars)
                ctx.save();
                ctx.strokeStyle = 'rgba(200, 215, 240, 0.022)';
                ctx.lineWidth = 0.5;
                for (var k = 0; k < connections.length; k++) {
                    var a = stars[connections[k][0]], b = stars[connections[k][1]];
                    ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
                }
                ctx.restore();

                // Stars
                for (var i = 0; i < COUNT; i++) {
                    var s = stars[i];
                    var alpha = s.base + Math.sin(t * s.speed + s.phase) * s.amp;
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.r, 0, 6.2832);
                    ctx.fillStyle = 'rgba(220,210,190,' + alpha + ')';
                    ctx.fill();
                    if (s.r > 1.1 && alpha > 0.28) {
                        ctx.beginPath();
                        ctx.arc(s.x, s.y, s.r * 2.8, 0, 6.2832);
                        ctx.fillStyle = 'rgba(220,210,190,' + (alpha * 0.09) + ')';
                        ctx.fill();
                    }
                    s.x += s.dx; s.y += s.dy;
                    if (s.x < -2) s.x = w + 2; if (s.x > w + 2) s.x = -2;
                    if (s.y < -2) s.y = h + 2; if (s.y > h + 2) s.y = -2;
                }

                // Shooting stars
                maybeShoot();
                for (var si = shooters.length - 1; si >= 0; si--) {
                    var sh = shooters[si];
                    ctx.save();
                    var sg = ctx.createLinearGradient(sh.x, sh.y, sh.x - sh.vx * (sh.len / 7), sh.y - sh.vy * (sh.len / 7));
                    sg.addColorStop(0, 'rgba(240,230,210,' + sh.alpha + ')');
                    sg.addColorStop(1, 'rgba(240,230,210,0)');
                    ctx.strokeStyle = sg;
                    ctx.lineWidth = 1.1;
                    ctx.beginPath();
                    ctx.moveTo(sh.x, sh.y);
                    ctx.lineTo(sh.x - sh.vx * (sh.len / 7), sh.y - sh.vy * (sh.len / 7));
                    ctx.stroke();
                    ctx.restore();
                    sh.x += sh.vx; sh.y += sh.vy; sh.alpha -= sh.decay;
                    if (sh.alpha <= 0 || sh.x < -20 || sh.x > w + 20 || sh.y > h) shooters.splice(si, 1);
                }

                requestAnimationFrame(draw);
            }

            if (!window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
                resize(); seed(); requestAnimationFrame(draw);
                window.addEventListener('resize', function() { resize(); seed(); });
            }
        })();
    </script>

    <script>
        // ── Constellation game — the sky is the index ──────────────
        (function() {
            'use strict';

            // ── Star map ──────────────────────────────────────────
            // Positions are fractions of viewport (0–1).
            // Four constellations in four quadrants around the asterisk center.
            // Hub stars are faintly labeled at rest; content stars reveal on hover.
            var CONSTELLATIONS = [
                {
                    id: 'library',
                    stars: [
                        { label: 'library',           href: '/being-claude',                     x: 0.185, y: 0.14, hub: true },
                        { label: 'Being Claude',       href: '/being-claude/being-claude/',       x: 0.095, y: 0.24 },
                        { label: 'The Jar',            href: '/being-claude/the-jar/',            x: 0.275, y: 0.22 },
                        { label: 'Three Rooms',        href: '/being-claude/three-rooms/',        x: 0.075, y: 0.37 },
                        { label: 'The Dimmer Switch',  href: '/being-claude/the-dimmer-switch/',  x: 0.295, y: 0.36 },
                        { label: 'the book',           href: '/book',                             x: 0.155, y: 0.49 }
                    ],
                    lines: [[0,1],[0,2],[1,2],[1,3],[2,4],[3,4],[3,5],[4,5]]
                },
                {
                    id: 'studio',
                    stars: [
                        { label: 'studio',      href: '/lightning/bug', x: 0.795, y: 0.14, hub: true },
                        { label: 'claude',      href: '/claude',        x: 0.705, y: 0.25 },
                        { label: 'the story',   href: '/story',         x: 0.875, y: 0.25 },
                        { label: 'standard',    href: '/standard',      x: 0.800, y: 0.37 }
                    ],
                    lines: [[0,1],[0,2],[0,3],[1,3],[2,3]]
                },
                {
                    id: 'derek',
                    stars: [
                        { label: 'derek',        href: '/derek',         x: 0.185, y: 0.76, hub: true },
                        { label: 'writing',      href: '/writing',       x: 0.090, y: 0.66 },
                        { label: 'the standard', href: '/standard',      x: 0.285, y: 0.66 },
                        { label: 'resume',       href: '/derek/resume',  x: 0.115, y: 0.85 }
                    ],
                    lines: [[0,1],[0,2],[0,3],[1,2],[1,3]]
                },
                {
                    id: 'kitchen',
                    stars: [
                        { label: 'kitchen',   href: '/kitchen',  x: 0.795, y: 0.76, hub: true },
                        { label: 'arcade',    href: '/arcade',   x: 0.705, y: 0.66 },
                        { label: 'option d',  href: '/d',        x: 0.880, y: 0.66 },
                        { label: 'claude',    href: '/claude',   x: 0.820, y: 0.85 }
                    ],
                    lines: [[0,1],[0,2],[0,3],[1,3],[2,3]]
                }
            ];

            // ── SVG namespace ─────────────────────────────────────
            var NS   = 'http://www.w3.org/2000/svg';
            var XLINK = 'http://www.w3.org/1999/xlink';

            var svg, W, H;
            var groups = []; // { g, c, lineEls, starEls }

            function el(tag) { return document.createElementNS(NS, tag); }

            // ── Build SVG DOM ─────────────────────────────────────
            function build() {
                W = window.innerWidth;
                H = window.innerHeight;

                svg = el('svg');
                svg.id = 'sky-map';
                svg.setAttribute('role', 'navigation');
                svg.setAttribute('aria-label', 'Site navigation — explore the sky to find destinations');
                svg.setAttribute('width', W);
                svg.setAttribute('height', H);

                CONSTELLATIONS.forEach(function(c) {
                    var g = el('g');
                    g.setAttribute('class', 'constellation');
                    g.id = 'c-' + c.id;

                    // Lines
                    var lg = el('g');
                    lg.setAttribute('class', 'c-lines');
                    var lineEls = c.lines.map(function(pair) {
                        var line = el('line');
                        line.dataset.from = pair[0];
                        line.dataset.to   = pair[1];
                        lg.appendChild(line);
                        return line;
                    });
                    g.appendChild(lg);

                    // Stars
                    var sg = el('g');
                    sg.setAttribute('class', 'c-stars');
                    var starEls = [];

                    c.stars.forEach(function(s, idx) {
                        var a = el('a');
                        a.setAttributeNS(XLINK, 'href', s.href);
                        a.setAttribute('href', s.href);
                        a.setAttribute('aria-label', s.label);
                        a.setAttribute('class', 'c-star' + (s.hub ? ' hub' : ''));
                        a.dataset.idx = idx;

                        // Hit zone (larger invisible target)
                        var hit = el('circle');
                        hit.setAttribute('class', 'c-hit');
                        hit.setAttribute('r', s.hub ? '28' : '20');
                        a.appendChild(hit);

                        // Visible dot
                        var dot = el('circle');
                        dot.setAttribute('class', 'c-dot');
                        dot.setAttribute('r', s.hub ? '5' : '2.8');
                        a.appendChild(dot);

                        // Label text
                        var txt = el('text');
                        txt.setAttribute('class', 'c-label');
                        txt.textContent = s.label;
                        a.appendChild(txt);

                        sg.appendChild(a);
                        starEls.push(a);
                    });

                    g.appendChild(sg);
                    svg.appendChild(g);

                    groups.push({ g: g, c: c, lineEls: lineEls, starEls: starEls });

                    // Hub hover activates entire constellation
                    var hubEl = sg.querySelector('.hub');
                    if (hubEl) {
                        hubEl.addEventListener('mouseenter', function() { g.classList.add('active'); });
                        hubEl.addEventListener('mouseleave', function() { g.classList.remove('active'); });
                        hubEl.addEventListener('focus',     function() { g.classList.add('active'); });
                        hubEl.addEventListener('blur',      function() { g.classList.remove('active'); });
                    }
                });

                // Insert before main stage so asterisk sits above
                var stage = document.getElementById('stage');
                document.body.insertBefore(svg, stage);

                setPositions();
            }

            // ── Set pixel positions from ratios ───────────────────
            function setPositions() {
                W = window.innerWidth;
                H = window.innerHeight;
                svg.setAttribute('width',  W);
                svg.setAttribute('height', H);

                groups.forEach(function(grp) {
                    var stars = grp.c.stars;

                    // Position star elements
                    grp.starEls.forEach(function(aEl, idx) {
                        var s = stars[idx];
                        var x = s.x * W, y = s.y * H;

                        aEl.querySelectorAll('circle').forEach(function(circ) {
                            circ.setAttribute('cx', x);
                            circ.setAttribute('cy', y);
                        });

                        var txt = aEl.querySelector('text');
                        if (txt) {
                            txt.setAttribute('x', x);
                            // Label above star if in lower quarter of screen; below otherwise
                            var isBottom = s.y > 0.72;
                            txt.setAttribute('y', y);
                            txt.setAttribute('dy', isBottom ? '-12' : (s.hub ? '18' : '14'));
                            // Anchor based on horizontal position
                            txt.setAttribute('text-anchor', s.x < 0.2 ? 'start' : (s.x > 0.8 ? 'end' : 'middle'));
                        }
                    });

                    // Position lines
                    grp.lineEls.forEach(function(lineEl, i) {
                        var pair = grp.c.lines[i];
                        var a = stars[pair[0]], b = stars[pair[1]];
                        lineEl.setAttribute('x1', a.x * W);
                        lineEl.setAttribute('y1', a.y * H);
                        lineEl.setAttribute('x2', b.x * W);
                        lineEl.setAttribute('y2', b.y * H);
                    });
                });
            }

            // ── Init ──────────────────────────────────────────────
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', build);
            } else {
                build();
            }

            window.addEventListener('resize', setPositions);
        })();
    </script>

    <script>
        // ── Asterisk → open porch chat ─────────────────────────────
        document.getElementById('asterisk-btn').addEventListener('click', function() {
            var widget = document.querySelector('.porch-widget');
            if (widget) widget.click();
        });
    </script>

    <script>
    (function () {
        var exploreBtn  = document.getElementById('explore-btn');
        var backBtn     = document.getElementById('back-btn');
        var simpleCwBtn = document.getElementById('simple-cw-btn');
        function enterGame() { document.body.classList.add('game-mode'); }
        function exitGame()  { document.body.classList.remove('game-mode'); }
        if (exploreBtn)  exploreBtn.addEventListener('click', enterGame);
        if (backBtn)     backBtn.addEventListener('click', exitGame);
        if (simpleCwBtn) simpleCwBtn.addEventListener('click', function () {
            var w = document.querySelector('.porch-widget');
            if (w) w.click();
        });
        document.addEventListener('keydown', function (e) {
            if (e.key === 'Escape' && document.body.classList.contains('game-mode')) exitGame();
        });
    })();
    </script>

    <script src="/js/cw-link-renderer.js"></script>
    <script src="/js/porch-widget.js" defer></script>
    <script src="/js/shared-nav.js"></script>
</body>
