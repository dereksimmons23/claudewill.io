    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #080c14;
            --text: #e2e8f0;
            --bright: #e5e9f0;
            --accent: #d4a84b;
            --dim: #4a5a70;
            --font: 'IBM Plex Mono', 'Courier New', Courier, monospace;
        }

        /* ── One screen — no scroll on homepage ── */
        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            font-size: 16px;
            display: flex;
            flex-direction: column;
        }

        /* ── Canvas layers — aurora behind stars ── */
        #aurora,
        #stars {
            position: fixed;
            inset: 0;
            pointer-events: none;
        }
        #aurora { z-index: 0; }
        #stars  { z-index: 1; }

        /* ── Ambient essay titles — atmosphere only ── */
        .sky-ambient {
            position: fixed;
            inset: 0;
            z-index: 2;
            pointer-events: none;
        }

        .sky-ambient span {
            position: absolute;
            color: rgba(226, 232, 240, 0.09);
            font-family: var(--font);
            white-space: nowrap;
            will-change: transform;
        }

        /* ── Stage — fills viewport, compass in upper half ── */
        .stage {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: clamp(8vh, 12vh, 15vh);
            position: relative;
            z-index: 3;
        }

        /* ── Compass scene — north star + wordmark + rooms ── */
        .compass-scene {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
        }

        /* ── Navigation word-stars — gold, no box ── */
        .nav-star {
            font-family: var(--font);
            font-size: clamp(0.72rem, 1.8vw, 0.92rem);
            font-weight: 400;
            color: var(--accent);
            text-decoration: none;
            letter-spacing: 0.22em;
            text-transform: lowercase;
            opacity: 0.8;
            transition: opacity 0.25s ease, text-shadow 0.25s ease;
            padding: 0.4rem 0.5rem;
            min-height: 44px;
            display: inline-flex;
            align-items: center;
        }

        .nav-star:hover,
        .nav-star:focus-visible {
            opacity: 1;
            text-shadow:
                0 0 14px rgba(212, 168, 75, 0.65),
                0 0 32px rgba(212, 168, 75, 0.25);
        }

        .nav-star:visited { color: var(--accent); }

        .nav-library {
            margin-bottom: 0.25rem;
            opacity: 0;
            animation: starArrive 0.8s ease-out 0.6s forwards;
        }

        .nav-kitchen {
            margin-top: 0.25rem;
            opacity: 0;
            animation: starArrive 0.8s ease-out 1.4s forwards;
        }

        /* ── North star — the asterisk ── */
        .asterisk-center {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(3.2rem, 7vw, 5.5rem);
            font-weight: 700;
            color: var(--accent);
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.5rem;
            min-height: 44px;
            min-width: 44px;
            line-height: 1;
            font-family: var(--font);
            text-shadow:
                0 0 22px rgba(212, 168, 75, 0.75),
                0 0 55px rgba(212, 168, 75, 0.35),
                0 0 100px rgba(212, 168, 75, 0.12);
            animation: starGlow 4s ease-in-out infinite;
            margin-bottom: 1.25rem;
        }

        .asterisk-center:hover {
            text-shadow:
                0 0 30px rgba(212, 168, 75, 1),
                0 0 70px rgba(212, 168, 75, 0.55),
                0 0 120px rgba(212, 168, 75, 0.2);
        }

        @keyframes starGlow {
            0%, 100% {
                text-shadow:
                    0 0 22px rgba(212, 168, 75, 0.75),
                    0 0 55px rgba(212, 168, 75, 0.35),
                    0 0 100px rgba(212, 168, 75, 0.12);
            }
            50% {
                text-shadow:
                    0 0 30px rgba(212, 168, 75, 0.95),
                    0 0 70px rgba(212, 168, 75, 0.5),
                    0 0 120px rgba(212, 168, 75, 0.18);
            }
        }

        /* ── Wordmark row — derek | Claude Will. | studio ── */
        .wordmark-row {
            display: flex;
            align-items: center;
            gap: clamp(1.25rem, 4vw, 3rem);
            opacity: 0;
            animation: fadeToDepth 1.8s ease-out 1s forwards;
        }

        /* Wordmark fades in faded — depth effect */
        @keyframes fadeToDepth {
            from { opacity: 0; transform: scale(1.04); }
            to   { opacity: 0.42; transform: scale(1); }
        }

        .name {
            text-align: center;
            pointer-events: none;
        }

        .name-line {
            display: block;
            font-size: clamp(2.8rem, 12vw, 10rem);
            font-weight: 700;
            color: var(--bright);
            line-height: 0.92;
            letter-spacing: -0.03em;
        }

        /* ── Wordmark flanking stars (derek, studio) ── */
        .nav-derek,
        .nav-studio {
            opacity: 0;
            animation: starArrive 0.8s ease-out 1.0s forwards;
            white-space: nowrap;
        }

        @keyframes starArrive {
            from { opacity: 0; transform: translateY(6px); }
            to   { opacity: 0.8; transform: translateY(0); }
        }

        /* ── Subscribe + countdown — between kitchen and footer ── */
        .porch-subscribe {
            margin-top: clamp(1.25rem, 3vh, 2.5rem);
            text-align: center;
            opacity: 0;
            animation: starArrive 1s ease-out 2s forwards;
        }

        .book-countdown-link {
            display: block;
            font-size: 0.72rem;
            color: var(--accent);
            text-decoration: none;
            letter-spacing: 0.07em;
            font-variant-numeric: tabular-nums;
            margin-bottom: 0.6rem;
            opacity: 0.85;
            transition: opacity 0.2s;
        }
        .book-countdown-link:hover { opacity: 1; text-shadow: 0 0 10px rgba(212, 168, 75, 0.4); }
        .book-countdown-link:visited { color: var(--accent); }

        .subscribe-wrap {
            max-width: 280px;
            margin: 0 auto;
        }

        /* ── Footer ── */
        .site-footer {
            flex-shrink: 0;
            padding: 0.75rem 2rem 1rem;
            text-align: center;
            font-size: 0.68rem;
            color: var(--dim);
            letter-spacing: 0.04em;
            z-index: 4;
            position: relative;
        }

        .site-footer a {
            color: var(--dim);
            text-decoration: none;
            padding: 0.2rem 0.3rem;
            transition: color 0.2s;
        }

        .site-footer a:hover { color: var(--bright); }
        .site-footer a:visited { color: var(--dim); }

        /* ── Accessibility ── */
        .sr-only {
            position: absolute;
            width: 1px; height: 1px;
            padding: 0; margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border-width: 0;
        }

        button:focus-visible, a:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }
        button:focus:not(:focus-visible) { outline: none; }

        /* ── Mobile ── */
        @media (max-width: 600px) {
            .stage { padding-top: clamp(7vh, 10vh, 12vh); }
            .asterisk-center { margin-bottom: 0.875rem; }
            .wordmark-row { gap: 0.75rem; }
            .nav-star { font-size: 0.68rem; letter-spacing: 0.18em; padding: 0.35rem 0.4rem; }
            .site-footer { padding: 0.65rem 1rem 0.875rem; }
        }

        /* ── Very small screens ── */
        @media (max-height: 580px) {
            .stage { padding-top: 5vh; }
            .porch-subscribe { margin-top: 0.75rem; }
        }

        /* ── Reduced motion ── */
        @media (prefers-reduced-motion: reduce) {
            .nav-library, .nav-kitchen, .nav-derek, .nav-studio, .wordmark-row, .porch-subscribe {
                opacity: 1; animation: none; transform: none;
            }
            .wordmark-row { opacity: 0.42; }
            #aurora, #stars { display: none; }
            .asterisk-center {
                animation: none;
                text-shadow: 0 0 18px rgba(212, 168, 75, 0.6);
            }
        }
    </style>
</head>

    <script>
        // ── Aurora borealis — cinematic curtains of light ──────────
        (function() {
            var c = document.getElementById('aurora');
            if (!c) return;
            var ctx = c.getContext('2d');
            var w, h;

            function resize() { w = c.width = window.innerWidth; h = c.height = window.innerHeight; }

            // Four aurora bands — deeper movement, more dramatic
            var bands = [
                { yRatio: 0.12, amp: 38, wl: 520, phase: 0,    color: '0, 200, 160',   alpha: 0.075, speed: 0.00018 },
                { yRatio: 0.20, amp: 52, wl: 680, phase: 2.1,  color: '123, 104, 238', alpha: 0.058, speed: 0.00012 },
                { yRatio: 0.07, amp: 24, wl: 380, phase: 4.5,  color: '0, 229, 255',   alpha: 0.035, speed: 0.00022 },
                { yRatio: 0.28, amp: 30, wl: 800, phase: 1.3,  color: '80, 60, 180',   alpha: 0.032, speed: 0.00008 }
            ];

            function drawBand(b, t) {
                var y0 = h * b.yRatio;
                var bandH = b.amp * 4;
                ctx.beginPath();
                ctx.moveTo(0, y0);
                for (var x = 0; x <= w; x += 5) {
                    ctx.lineTo(x, y0 + Math.sin((x / b.wl) + b.phase + t * b.speed) * b.amp);
                }
                ctx.lineTo(w, y0 + bandH);
                ctx.lineTo(0, y0 + bandH);
                ctx.closePath();

                var grad = ctx.createLinearGradient(0, y0 - b.amp, 0, y0 + bandH);
                grad.addColorStop(0,   'rgba(' + b.color + ', 0)');
                grad.addColorStop(0.25,'rgba(' + b.color + ', ' + b.alpha + ')');
                grad.addColorStop(0.65,'rgba(' + b.color + ', ' + (b.alpha * 0.55) + ')');
                grad.addColorStop(1,   'rgba(' + b.color + ', 0)');
                ctx.fillStyle = grad;
                ctx.fill();
            }

            function draw(t) {
                ctx.clearRect(0, 0, w, h);
                for (var i = 0; i < bands.length; i++) drawBand(bands[i], t);
                requestAnimationFrame(draw);
            }

            var prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
            if (!prefersReduced) {
                resize();
                requestAnimationFrame(draw);
                window.addEventListener('resize', resize);
            }
        })();
    </script>

    <script>
        // ── Star field — constellation lines + shooting stars ─────
        (function() {
            var c = document.getElementById('stars');
            if (!c) return;
            var ctx = c.getContext('2d');
            var stars = [];
            var connections = [];
            var shooters = [];
            var count = 280;
            var w, h;

            function resize() { w = c.width = window.innerWidth; h = c.height = window.innerHeight; }

            function seed() {
                stars = [];
                for (var i = 0; i < count; i++) {
                    stars.push({
                        x: Math.random() * w, y: Math.random() * h,
                        r: Math.random() * 1.6 + 0.2,
                        base: Math.random() * 0.45 + 0.08,
                        amp: Math.random() * 0.3,
                        speed: Math.random() * 0.0012 + 0.0002,
                        phase: Math.random() * Math.PI * 2,
                        dx: (Math.random() - 0.5) * 0.006,
                        dy: (Math.random() - 0.5) * 0.004
                    });
                }
                buildConnections();
            }

            // Build a stable set of constellation lines from nearby star pairs
            function buildConnections() {
                connections = [];
                var maxDist = 140;
                var limit = 18;
                for (var i = 0; i < stars.length && connections.length < limit; i++) {
                    for (var j = i + 1; j < stars.length && connections.length < limit; j++) {
                        var dx = stars[i].x - stars[j].x;
                        var dy = stars[i].y - stars[j].y;
                        if (Math.sqrt(dx * dx + dy * dy) < maxDist) {
                            connections.push([i, j]);
                        }
                    }
                }
            }

            function drawConnections() {
                ctx.save();
                ctx.strokeStyle = 'rgba(200, 215, 240, 0.025)';
                ctx.lineWidth = 0.5;
                for (var k = 0; k < connections.length; k++) {
                    var a = stars[connections[k][0]];
                    var b = stars[connections[k][1]];
                    ctx.beginPath();
                    ctx.moveTo(a.x, a.y);
                    ctx.lineTo(b.x, b.y);
                    ctx.stroke();
                }
                ctx.restore();
            }

            function maybeShoot() {
                if (shooters.length < 2 && Math.random() < 0.0008) {
                    var fromRight = Math.random() > 0.5;
                    shooters.push({
                        x: fromRight ? w * 0.8 + Math.random() * w * 0.2 : Math.random() * w * 0.3,
                        y: Math.random() * h * 0.45,
                        vx: fromRight ? -(3 + Math.random() * 4) : (3 + Math.random() * 4),
                        vy: 1.5 + Math.random() * 2,
                        alpha: 0.9,
                        len: 70 + Math.random() * 90,
                        decay: 0.016 + Math.random() * 0.01
                    });
                }
            }

            function drawShooters() {
                for (var i = shooters.length - 1; i >= 0; i--) {
                    var s = shooters[i];
                    ctx.save();
                    var grad = ctx.createLinearGradient(s.x, s.y, s.x - s.vx * (s.len / 8), s.y - s.vy * (s.len / 8));
                    grad.addColorStop(0, 'rgba(240, 230, 210, ' + s.alpha + ')');
                    grad.addColorStop(1, 'rgba(240, 230, 210, 0)');
                    ctx.strokeStyle = grad;
                    ctx.lineWidth = 1.2;
                    ctx.beginPath();
                    ctx.moveTo(s.x, s.y);
                    ctx.lineTo(s.x - s.vx * (s.len / 8), s.y - s.vy * (s.len / 8));
                    ctx.stroke();
                    ctx.restore();
                    s.x += s.vx;
                    s.y += s.vy;
                    s.alpha -= s.decay;
                    if (s.alpha <= 0 || s.x < -20 || s.x > w + 20 || s.y > h) {
                        shooters.splice(i, 1);
                    }
                }
            }

            function draw(t) {
                ctx.clearRect(0, 0, w, h);
                drawConnections();
                for (var i = 0; i < count; i++) {
                    var s = stars[i];
                    var a = s.base + Math.sin(t * s.speed + s.phase) * s.amp;
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.r, 0, 6.2832);
                    ctx.fillStyle = 'rgba(220,210,190,' + a + ')';
                    ctx.fill();
                    if (s.r > 1.1 && a > 0.3) {
                        ctx.beginPath();
                        ctx.arc(s.x, s.y, s.r * 2.8, 0, 6.2832);
                        ctx.fillStyle = 'rgba(220,210,190,' + (a * 0.1) + ')';
                        ctx.fill();
                    }
                    s.x += s.dx; s.y += s.dy;
                    if (s.x < -2) s.x = w + 2; if (s.x > w + 2) s.x = -2;
                    if (s.y < -2) s.y = h + 2; if (s.y > h + 2) s.y = -2;
                }
                maybeShoot();
                drawShooters();
                requestAnimationFrame(draw);
            }

            var prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
            if (!prefersReduced) {
                resize(); seed(); requestAnimationFrame(draw);
                window.addEventListener('resize', function() { resize(); seed(); });
            }
        })();
    </script>

    <script>
        // ── Ambient essay titles — scatter across full viewport ────
        (function() {
            var sky = document.getElementById('sky-writing');
            if (!sky) return;

            var titles = [
                'The Jar', 'Being Claude', 'Loss Function', 'truth over comfort',
                'lightning/bug', 'the book', 'The Dimmer Switch', 'Three Rooms',
                'The Disclaimer', 'The Duality', 'keep going', 'The Last Nine Percent',
                'The Reconsideration', 'The Hall Effect', 'The Warm-Up Effect'
            ];

            var sizes = [0.6, 0.65, 0.7, 0.74, 0.78];

            var s = document.createElement('style');
            s.textContent = '@keyframes drift{0%{transform:translateX(-50%) translate(0,0)}100%{transform:translateX(-50%) translate(var(--dx),var(--dy))}}';
            document.head.appendChild(s);

            for (var i = 0; i < 12; i++) {
                var span = document.createElement('span');
                span.textContent = titles[i % titles.length];

                var top, left;
                // Avoid center band (40–62%) where compass lives
                do { top = Math.random() * 90; } while (top > 38 && top < 62);
                left = 5 + Math.random() * 88;

                span.style.top = top + '%';
                span.style.left = left + '%';
                span.style.transform = 'translateX(-50%)';
                span.style.fontSize = sizes[Math.floor(Math.random() * sizes.length)] + 'rem';

                var dx = (Math.random() - 0.5) * 20;
                var dy = (Math.random() - 0.5) * 10;
                var dur = 55 + Math.random() * 55;
                var delay = Math.random() * -90;

                span.style.setProperty('--dx', dx + 'px');
                span.style.setProperty('--dy', dy + 'px');
                span.style.animation = 'drift ' + dur + 's ease-in-out ' + delay + 's infinite alternate';

                sky.appendChild(span);
            }
        })();
    </script>

    <script>
        // ── Book countdown ─────────────────────────────────────────
        (function() {
            var el = document.getElementById('book-countdown');
            if (!el) return;
            var bookDate = new Date('2026-06-28T00:00:00').getTime();
            function tick() {
                var diff = bookDate - Date.now();
                if (diff <= 0) { el.textContent = 'the book is here'; return; }
                var d = Math.floor(diff / 86400000);
                var h = Math.floor((diff % 86400000) / 3600000);
                var m = Math.floor((diff % 3600000) / 60000);
                el.textContent = d + 'd ' + h + 'h ' + m + 'm until the book';
            }
            tick();
            setInterval(tick, 60000);
        })();
    </script>
