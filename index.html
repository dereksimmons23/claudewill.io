    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #080c14;
            --text: #e2e8f0;
            --bright: #e5e9f0;
            --accent: #d4a84b;
            --dim: #4a5a70;
            --font: 'IBM Plex Mono', 'Courier New', Courier, monospace;
        }

        /* ── One screen — no scroll on homepage ── */
        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            font-size: 16px;
        }

        /* ── Canvas layers — aurora behind stars ── */
        #aurora,
        #stars {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }
        #aurora { z-index: 0; }
        #stars  { z-index: 1; }

        /* ── Ambient essay titles — atmosphere only ── */
        .sky-ambient {
            position: fixed;
            inset: 0;
            z-index: 2;
            pointer-events: none; /* atmospheric — compass handles nav */
        }

        .sky-ambient a {
            position: absolute;
            color: rgba(226, 232, 240, 0.12);
            text-decoration: none;
            font-family: var(--font);
            white-space: nowrap;
            will-change: transform;
        }

        /* ── The Porch — full viewport, one screen ── */
        .porch-night {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 3;
        }

        /* Warm glow behind the asterisk */
        .porch-night::after {
            content: '';
            position: absolute;
            bottom: 25%;
            left: 50%;
            transform: translateX(-50%);
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(212, 168, 75, 0.04) 0%, transparent 60%);
            pointer-events: none;
            z-index: -1;
        }

        /* ── Wordmark ────────────────────────────── */
        .name {
            text-align: center;
            pointer-events: none;
            will-change: opacity;
        }

        .name-line {
            display: block;
            font-size: clamp(4rem, 18vw, 16rem);
            font-weight: 700;
            color: var(--bright);
            line-height: 0.92;
            letter-spacing: -0.03em;
        }

        .name-period {
            opacity: 0;
            animation: arrive 0.6s ease-out 2.2s forwards;
        }

        .porch-tagline {
            margin-top: 1.25rem;
            font-size: 0.85rem;
            color: var(--dim);
            letter-spacing: 0.06em;
            text-align: center;
            line-height: 1.5;
            opacity: 0;
            animation: arrive 1s ease-out 3s forwards;
        }

        /* ── Asterisk — the compass center ──────── */
        .porch-light {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(3rem, 6vw, 5rem);
            font-weight: 700;
            color: var(--accent);
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.75rem;
            min-height: 44px;
            min-width: 44px;
            margin: 2rem auto 0;
            line-height: 1;
            font-family: var(--font);
            z-index: 10;
            text-shadow:
                0 0 20px rgba(212, 168, 75, 0.7),
                0 0 50px rgba(212, 168, 75, 0.3),
                0 0 90px rgba(212, 168, 75, 0.1);
            animation: glow 4s ease-in-out infinite;
        }

        .porch-light:hover {
            text-shadow:
                0 0 30px rgba(212, 168, 75, 1),
                0 0 65px rgba(212, 168, 75, 0.55),
                0 0 110px rgba(212, 168, 75, 0.2);
        }

        @keyframes glow {
            0%, 100% {
                text-shadow:
                    0 0 20px rgba(212, 168, 75, 0.7),
                    0 0 50px rgba(212, 168, 75, 0.3),
                    0 0 90px rgba(212, 168, 75, 0.1);
            }
            50% {
                text-shadow:
                    0 0 28px rgba(212, 168, 75, 0.9),
                    0 0 65px rgba(212, 168, 75, 0.45),
                    0 0 110px rgba(212, 168, 75, 0.15);
            }
        }

        /* ── Mini corner trigger — non-homepage pages ── */
        .porch-light-mini {
            position: fixed;
            top: 1.25rem;
            right: 1.25rem;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent);
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.5rem;
            min-height: 44px;
            min-width: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
            font-family: var(--font);
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            text-shadow:
                0 0 12px rgba(212, 168, 75, 0.5),
                0 0 28px rgba(212, 168, 75, 0.2);
        }

        .porch-light-mini.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .porch-light-mini:hover {
            text-shadow:
                0 0 20px rgba(212, 168, 75, 0.8),
                0 0 45px rgba(212, 168, 75, 0.35);
        }

        /* ── Entrance animations ─────────────────── */
        .name-claude, .name-will { opacity: 0; }
        .name-claude { animation: arrive 1.2s ease-out 0.3s forwards; }
        .name-will   { animation: arrive 1.2s ease-out 1.2s forwards; }

        @keyframes arrive {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        /* ── Footer — fixed at bottom ────────────── */
        .site-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 4;
            padding: 0.875rem 2rem 1rem;
            text-align: center;
            font-size: 0.7rem;
            color: var(--dim);
            letter-spacing: 0.04em;
        }

        .footer-subscribe {
            margin: 0 auto 0.5rem;
            max-width: 320px;
        }

        .site-footer a {
            color: var(--dim);
            text-decoration: none;
            padding: 0.25rem 0.4rem;
            min-height: 44px;
            display: inline-flex;
            align-items: center;
        }

        .site-footer a:hover { color: var(--bright); }
        .site-footer a:visited { color: var(--dim); }

        .book-countdown {
            color: var(--accent);
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.06em;
        }
        .book-countdown:visited { color: var(--accent); }
        .book-countdown:hover { text-shadow: 0 0 10px rgba(212, 168, 75, 0.4); }

        /* ── Accessibility ────────────────────── */
        .sr-only {
            position: absolute;
            width: 1px; height: 1px;
            padding: 0; margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border-width: 0;
        }

        button:focus-visible, a:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }
        button:focus:not(:focus-visible) { outline: none; }

        /* ── Mobile ───────────────────────────── */
        @media (max-width: 600px) {
            .porch-light { font-size: 3rem; margin-top: 1.5rem; }
            .porch-light-mini { top: 0.75rem; right: 0.75rem; }
            .porch-tagline { font-size: 0.8rem; }
            .site-footer { padding: 0.75rem 1rem 0.875rem; }
        }

        /* ── Reduced motion ───────────────────── */
        @media (prefers-reduced-motion: reduce) {
            .name-claude, .name-will, .name-period, .porch-tagline {
                opacity: 1; animation: none;
            }
            #aurora, #stars { display: none; }
            .porch-light, .porch-light-mini {
                animation: none;
                text-shadow: 0 0 15px rgba(212, 168, 75, 0.5);
            }
        }
    </style>
</head>

    <script>
        // ── Aurora borealis — slow curtains of light ───────────────
        (function() {
            var c = document.getElementById('aurora');
            if (!c) return;
            var ctx = c.getContext('2d');
            var w, h;

            function resize() { w = c.width = window.innerWidth; h = c.height = window.innerHeight; }

            // Three aurora bands — cool teal/violet palette, avoids warm green fighting the gold
            var bands = [
                { yRatio: 0.14, amp: 32, wl: 560, phase: 0,    color: '0, 200, 160',   alpha: 0.065, speed: 0.00016 }, // cool teal-green
                { yRatio: 0.22, amp: 42, wl: 720, phase: 2.1,  color: '123, 104, 238', alpha: 0.048, speed: 0.00011 }, // soft indigo
                { yRatio: 0.08, amp: 20, wl: 400, phase: 4.5,  color: '0, 229, 255',   alpha: 0.028, speed: 0.00020 }  // cyan accent
            ];

            function drawBand(b, t) {
                var y0 = h * b.yRatio;
                var bandH = b.amp * 3.5;
                ctx.beginPath();
                ctx.moveTo(0, y0);
                for (var x = 0; x <= w; x += 6) {
                    ctx.lineTo(x, y0 + Math.sin((x / b.wl) + b.phase + t * b.speed) * b.amp);
                }
                ctx.lineTo(w, y0 + bandH);
                ctx.lineTo(0, y0 + bandH);
                ctx.closePath();

                var grad = ctx.createLinearGradient(0, y0 - b.amp, 0, y0 + bandH);
                grad.addColorStop(0,   'rgba(' + b.color + ', 0)');
                grad.addColorStop(0.3, 'rgba(' + b.color + ', ' + b.alpha + ')');
                grad.addColorStop(0.7, 'rgba(' + b.color + ', ' + (b.alpha * 0.6) + ')');
                grad.addColorStop(1,   'rgba(' + b.color + ', 0)');
                ctx.fillStyle = grad;
                ctx.fill();
            }

            function draw(t) {
                ctx.clearRect(0, 0, w, h);
                for (var i = 0; i < bands.length; i++) drawBand(bands[i], t);
                requestAnimationFrame(draw);
            }

            var prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
            if (!prefersReduced) {
                resize();
                requestAnimationFrame(draw);
                window.addEventListener('resize', resize);
            }
        })();
    </script>

    <script>
        // ── Star field canvas ──────────────────────────────────────
        (function() {
            var c = document.getElementById('stars');
            var ctx = c.getContext('2d');
            var stars = [];
            var count = 260;
            var w, h;

            function resize() { w = c.width = window.innerWidth; h = c.height = window.innerHeight; }

            function seed() {
                stars = [];
                for (var i = 0; i < count; i++) {
                    stars.push({
                        x: Math.random() * w, y: Math.random() * h,
                        r: Math.random() * 1.5 + 0.2,
                        base: Math.random() * 0.45 + 0.08,
                        amp: Math.random() * 0.3,
                        speed: Math.random() * 0.0012 + 0.0002,
                        phase: Math.random() * Math.PI * 2,
                        dx: (Math.random() - 0.5) * 0.006,
                        dy: (Math.random() - 0.5) * 0.004
                    });
                }
            }

            function draw(t) {
                ctx.clearRect(0, 0, w, h);
                for (var i = 0; i < count; i++) {
                    var s = stars[i];
                    var a = s.base + Math.sin(t * s.speed + s.phase) * s.amp;
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.r, 0, 6.2832);
                    ctx.fillStyle = 'rgba(220,210,190,' + a + ')';
                    ctx.fill();
                    if (s.r > 1.1 && a > 0.3) {
                        ctx.beginPath();
                        ctx.arc(s.x, s.y, s.r * 2.8, 0, 6.2832);
                        ctx.fillStyle = 'rgba(220,210,190,' + (a * 0.1) + ')';
                        ctx.fill();
                    }
                    s.x += s.dx; s.y += s.dy;
                    if (s.x < -2) s.x = w + 2; if (s.x > w + 2) s.x = -2;
                    if (s.y < -2) s.y = h + 2; if (s.y > h + 2) s.y = -2;
                }
                requestAnimationFrame(draw);
            }

            var prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
            if (!prefersReduced) {
                resize(); seed(); requestAnimationFrame(draw);
                window.addEventListener('resize', function() { resize(); seed(); });
            }
        })();
    </script>

    <script>
        // ── Ambient essay titles — scatter across full viewport ────
        (function() {
            var sky = document.getElementById('sky-writing');
            if (!sky) return;

            var titles = [
                'The Jar', 'Being Claude', 'Loss Function', 'truth over comfort',
                'lightning/bug', 'the book', 'The Dimmer Switch', 'Three Rooms',
                'The Disclaimer', 'The Duality', 'keep going', 'The Last Nine Percent',
                'The Reconsideration', 'The Hall Effect', 'The Warm-Up Effect'
            ];

            var sizes = [0.62, 0.68, 0.72, 0.76, 0.8];

            // Inject drift keyframes
            var s = document.createElement('style');
            s.textContent = '@keyframes drift{0%{transform:translateX(-50%) translate(0,0)}100%{transform:translateX(-50%) translate(var(--dx),var(--dy))}}';
            document.head.appendChild(s);

            // Scatter across full viewport, avoid center cluster
            for (var i = 0; i < 12; i++) {
                var span = document.createElement('span');
                span.textContent = titles[i % titles.length];
                span.style.cssText = 'position:absolute;white-space:nowrap;font-family:var(--font,monospace);color:rgba(226,232,240,0.1);';

                var top, left;
                // Keep away from vertical center (40-60%) where compass lives
                do { top = Math.random() * 90; } while (top > 35 && top < 65);
                left = 5 + Math.random() * 88;

                span.style.top = top + '%';
                span.style.left = left + '%';
                span.style.transform = 'translateX(-50%)';
                span.style.fontSize = sizes[Math.floor(Math.random() * sizes.length)] + 'rem';

                var dx = (Math.random() - 0.5) * 18;
                var dy = (Math.random() - 0.5) * 8;
                var dur = 50 + Math.random() * 50;
                var delay = Math.random() * -80;

                span.style.setProperty('--dx', dx + 'px');
                span.style.setProperty('--dy', dy + 'px');
                span.style.animation = 'drift ' + dur + 's ease-in-out ' + delay + 's infinite alternate';

                sky.appendChild(span);
            }
        })();
    </script>

            var bookDate = new Date('2026-06-28T00:00:00').getTime();
            function tick() {
                var diff = bookDate - Date.now();
                if (diff <= 0) { el.textContent = 'the book is here'; return; }
                var d = Math.floor(diff / 86400000);
                var h = Math.floor((diff % 86400000) / 3600000);
                var m = Math.floor((diff % 3600000) / 60000);
                el.textContent = d + 'd ' + h + 'h ' + m + 'm until the book';
            }
            tick();
            setInterval(tick, 60000); // minutes-only refresh — no second jitter
        })();
    </script>
</body>
</html>
