    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0a1628;
            --text: #c8d0dc;
            --bright: #e5e9f0;
            --accent: #d4a84b;
            --dim: #4a5a70;
            --font: 'IBM Plex Mono', 'Courier New', Courier, monospace;
        }

        body {
            font-family: var(--font);
            background: #060e1e;
            color: var(--text);
            line-height: 1.6;
            font-size: 16px;
            overflow-x: hidden;
        }

        /* ── The North Star — nav trigger ────── */
        .porch-light {
            position: fixed;
            top: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent);
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.25rem;
            line-height: 1;
            font-family: var(--font);
            z-index: 100;
            text-shadow:
                0 0 15px rgba(212, 168, 75, 0.5),
                0 0 35px rgba(212, 168, 75, 0.2);
            animation: glow 4s ease-in-out infinite;
        }

        .porch-light:hover {
            text-shadow:
                0 0 25px rgba(212, 168, 75, 0.8),
                0 0 50px rgba(212, 168, 75, 0.4),
                0 0 80px rgba(212, 168, 75, 0.15);
        }

        @keyframes glow {
            0%, 100% {
                text-shadow:
                    0 0 15px rgba(212, 168, 75, 0.5),
                    0 0 35px rgba(212, 168, 75, 0.2);
            }
            50% {
                text-shadow:
                    0 0 20px rgba(212, 168, 75, 0.7),
                    0 0 45px rgba(212, 168, 75, 0.3),
                    0 0 70px rgba(212, 168, 75, 0.1);
            }
        }

        /* ── The Declaration ──────────────────── */
        .declaration {
            min-height: 100vh;
            padding: 2rem;
            position: relative;
            background: transparent;
        }

        /* Faint warm glow from the porch light corner */
        .declaration::after {
            content: '';
            position: absolute;
            top: -10%;
            right: -5%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(212, 168, 75, 0.04) 0%, transparent 60%);
            pointer-events: none;
        }

        /* ── The Name — fixed, recedes on scroll ─ */
        .name {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 1;
            will-change: transform, opacity;
            pointer-events: none;
        }

        .name-line {
            display: block;
            font-size: 18vw;
            font-weight: 700;
            color: var(--bright);
            line-height: 0.95;
            letter-spacing: -0.03em;
        }

        .name-period {
            opacity: 0;
            animation: arrive 0.6s ease-out 2.2s forwards;
            transition: opacity 0.4s;
        }

        .name-hook {
            position: fixed;
            top: calc(50% - 16vw);
            left: 50%;
            transform: translateX(-50%);
            z-index: 1;
            font-size: 0.85rem;
            font-weight: 400;
            color: var(--dim);
            letter-spacing: 0.12em;
            white-space: nowrap;
            opacity: 0;
            animation: arrive 0.6s ease-out 0.5s forwards;
            pointer-events: none;
            will-change: transform, opacity;
        }

        @media (max-width: 600px) {
            .name-hook {
                top: calc(50% - 24vw);
                font-size: 0.7rem;
                letter-spacing: 0.08em;
            }
        }

        /* ── The Stars — full page canvas ─────── */
        #stars {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        /* ── Scrolling content sits above the name ── */
        .sky, .ground, .site-footer {
            position: relative;
            z-index: 2;
        }

        .sky {
            min-height: 140vh;
            padding: 6rem 2rem;
        }

        .sky-writing {
            position: relative;
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            height: 120vh;
        }

        .sky-writing a {
            position: absolute;
            color: rgba(200, 210, 220, 0.25);
            text-decoration: none;
            font-family: var(--font);
            transition: color 0.8s ease, text-shadow 0.8s ease, transform 0.8s ease;
            white-space: nowrap;
        }

        .sky-writing a:visited { color: rgba(200, 210, 220, 0.25); }

        .sky-writing a:hover {
            color: var(--accent) !important;
            text-shadow: 0 0 20px rgba(212, 168, 75, 0.3);
        }

        /* Titles brighten as they cross through the name */
        .sky-writing a.star-bright {
            color: rgba(229, 233, 240, 0.85) !important;
            text-shadow: 0 0 15px rgba(229, 233, 240, 0.15);
        }

        .sky-writing a.star-bright:visited {
            color: rgba(229, 233, 240, 0.85) !important;
        }

        .sky-writing a:nth-child(1)  { top: 3%;  left: 6%;   font-size: 1.15rem; color: rgba(200,210,220,0.5); }
        .sky-writing a:nth-child(2)  { top: 13%; right: 10%;  font-size: 0.85rem; }
        .sky-writing a:nth-child(3)  { top: 23%; left: 42%;   font-size: 0.95rem; color: rgba(200,210,220,0.35); }
        .sky-writing a:nth-child(4)  { top: 33%; left: 4%;    font-size: 0.8rem; }
        .sky-writing a:nth-child(5)  { top: 40%; right: 6%;   font-size: 1.05rem; color: rgba(200,210,220,0.4); }
        .sky-writing a:nth-child(6)  { top: 50%; left: 28%;   font-size: 0.75rem; }
        .sky-writing a:nth-child(7)  { top: 60%; right: 22%;  font-size: 0.9rem; color: rgba(200,210,220,0.3); }
        .sky-writing a:nth-child(8)  { top: 70%; left: 12%;   font-size: 0.85rem; color: rgba(200,210,220,0.35); }
        .sky-writing a:nth-child(9)  { top: 80%; right: 4%;   font-size: 0.8rem; }
        .sky-writing a:nth-child(10) { top: 90%; left: 48%;   font-size: 1rem; color: rgba(200,210,220,0.4); }

        /* ── The Ground — the byline ─────────── */
        .ground {
            text-align: center;
            padding: 3rem 2rem 1.5rem;
        }

        .ground-built-by {
            display: block;
            font-size: 0.8rem;
            color: var(--dim);
            letter-spacing: 0.08em;
            margin-bottom: 0.5rem;
        }

        .ground-derek {
            display: block;
            font-size: 3.5vw;
            font-weight: 700;
            color: var(--bright);
            text-decoration: none;
            letter-spacing: -0.03em;
            margin-top: 0.25rem;
            transition: color 0.3s;
        }

        .ground-derek:hover { color: var(--accent); }
        .ground-derek:visited { color: var(--bright); }

        /* ── Footer ───────────────────────────── */
        .site-footer {
            padding: 2rem;
            text-align: center;
            font-size: 0.75rem;
            color: var(--dim);
        }

        .site-footer a {
            color: var(--dim);
            text-decoration: none;
        }

        .site-footer a:hover { color: var(--bright); }
        .site-footer a:visited { color: var(--dim); }
        .footer-note + .footer-note { margin-top: 0.25rem; }
        .book-countdown {
            display: block;
            color: var(--accent);
            text-decoration: none;
            letter-spacing: 0.08em;
            font-size: 0.8rem;
            margin-top: 0.75rem;
            font-variant-numeric: tabular-nums;
        }
        .book-countdown:hover { text-shadow: 0 0 10px rgba(212, 168, 75, 0.3); }
        .book-countdown:visited { color: var(--accent); }

        /* ── Claude Will — typewriter section ── */
        .claude-will-section {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 3rem 2rem 3rem;
        }

        .typewriter-container {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            color: var(--bright);
            min-height: 1.6em;
        }

        .typewriter-label {
            color: var(--dim);
            margin-right: 0.25em;
            white-space: nowrap;
        }

        .typewriter-text {
            white-space: nowrap;
        }

        .typewriter-cursor {
            display: inline-block;
            color: var(--dim);
            animation: blink-cursor 0.8s step-end infinite;
            margin-left: 1px;
        }

        @keyframes blink-cursor {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* ── Email capture ────────────────────── */
        .email-capture {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 3rem 2rem 2rem;
        }

        .capture-label {
            display: none;
            font-size: 0.85rem;
            color: var(--dim);
            letter-spacing: 0.08em;
            margin-bottom: 1rem;
        }

        /* ── Entrance ─────────────────────────── */
        .name-claude,
        .name-will {
            opacity: 0;
        }

        .name-claude { animation: arrive 1.2s ease-out 0.3s forwards; }
        .name-will   { animation: arrive 1.2s ease-out 1.2s forwards; }

        @keyframes arrive {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* ── Accessibility ────────────────────── */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border-width: 0;
        }

        button:focus-visible,
        a:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }

        button:focus:not(:focus-visible) { outline: none; }

        /* ── Mobile ───────────────────────────── */
        @media (max-width: 600px) {
            .name-line { font-size: 22vw; }
            .declaration { padding: 1.5rem; }
            .sky-writing a { font-size: 0.8rem !important; }
            .porch-light { top: 1rem; }
            .ground-derek { font-size: 7vw; }
            .typewriter-container { font-size: 0.9rem; }
        }

        /* ── Reduced motion ───────────────────── */
        @media (prefers-reduced-motion: reduce) {
            .name-claude,
            .name-will,
            .name-period {
                opacity: 1;
                animation: none;
            }
            .name {
                position: static;
                transform: none;
            }
            .declaration {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
            }
            #stars { display: none; }
            .porch-light {
                animation: none;
                text-shadow:
                    0 0 15px rgba(212, 168, 75, 0.5),
                    0 0 35px rgba(212, 168, 75, 0.2);
            }
            .cursor { animation: none; opacity: 1; }
            .sky-writing a { transition: none; }
            .typewriter-cursor { animation: none; opacity: 1; }
        }
    </style>
</head>

    <script>
        // ── Scroll-driven animation ──────────────
        (function() {
            var nameEl = document.getElementById('name');
            var hookEl = document.getElementById('name-hook');
            var periodEl = document.getElementById('name-period');
            var periodDropped = false;
            var vh = window.innerHeight;
            var ticking = false;
            var ready = false;
            var prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

            if (prefersReduced) return;

            // Let the entrance animations finish before scroll takes over
            document.querySelector('.name-period').addEventListener('animationend', function() {
                ready = true;
            });
            setTimeout(function() { ready = true; }, 3500);

            function update() {
                if (!ready) { ticking = false; return; }
                var scrollY = window.scrollY;
                var maxScroll = document.documentElement.scrollHeight - vh;

                var recedeProgress = Math.min(1, scrollY / (vh * 0.8));

                // Recede into the stars, stay as a ghost. Never return.
                var scale = 1 - recedeProgress * 0.85;
                var opacity = Math.max(0.08, 1 - recedeProgress * 0.92);

                nameEl.style.transform = 'translate(-50%, -50%) scale(' + scale + ')';
                nameEl.style.opacity = opacity;

                // Hook fades with the name
                if (hookEl) {
                    var hookOpacity = Math.max(0, 1 - recedeProgress * 2);
                    hookEl.style.opacity = hookOpacity;
                    hookEl.style.visibility = hookOpacity === 0 ? 'hidden' : 'visible';
                }

                // Period drops as name fades — gone by 60% scroll
                if (recedeProgress > 0.5 && !periodDropped) {
                    periodDropped = true;
                    if (periodEl) periodEl.style.display = 'none';
                } else if (recedeProgress < 0.3 && periodDropped) {
                    periodDropped = false;
                    if (periodEl) periodEl.style.display = '';
                }
                ticking = false;
            }

            window.addEventListener('scroll', function() {
                if (!ticking) {
                    requestAnimationFrame(update);
                    ticking = true;
                }
            });

            window.addEventListener('resize', function() {
                vh = window.innerHeight;
            });

            // ── Essay titles — brighten as they cross through ──
            var titles = document.querySelectorAll('.sky-writing a');
            var observer = new IntersectionObserver(function(entries) {
                entries.forEach(function(entry) {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('star-bright');
                    }
                });
            }, { rootMargin: '-30% 0px -30% 0px' });

            titles.forEach(function(t) { observer.observe(t); });
        })();

        // ── Star field ──────────────────────────
        (function() {
            var c = document.getElementById('stars');
            var ctx = c.getContext('2d');
            var stars = [];
            var count = 500;
            var w, h;

            function resize() {
                w = c.width = window.innerWidth;
                h = c.height = window.innerHeight;
            }

            function seed() {
                stars = [];
                for (var i = 0; i < count; i++) {
                    stars.push({
                        x: Math.random() * w,
                        y: Math.random() * h,
                        r: Math.random() * 1.4 + 0.2,
                        base: Math.random() * 0.5 + 0.1,
                        amp: Math.random() * 0.35,
                        speed: Math.random() * 0.0015 + 0.0003,
                        phase: Math.random() * Math.PI * 2,
                        dx: (Math.random() - 0.5) * 0.008,
                        dy: (Math.random() - 0.5) * 0.005
                    });
                }
            }

            function draw(t) {
                ctx.clearRect(0, 0, w, h);
                for (var i = 0; i < count; i++) {
                    var s = stars[i];
                    var flicker = Math.sin(t * s.speed + s.phase);
                    var a = s.base + flicker * s.amp;

                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.r, 0, 6.2832);
                    ctx.fillStyle = 'rgba(200,210,220,' + a + ')';
                    ctx.fill();

                    // Bright stars get a glow
                    if (s.r > 1.2 && a > 0.35) {
                        ctx.beginPath();
                        ctx.arc(s.x, s.y, s.r * 2.5, 0, 6.2832);
                        ctx.fillStyle = 'rgba(200,210,220,' + (a * 0.12) + ')';
                        ctx.fill();
                    }

                    s.x += s.dx;
                    s.y += s.dy;
                    if (s.x < -2) s.x = w + 2;
                    if (s.x > w + 2) s.x = -2;
                    if (s.y < -2) s.y = h + 2;
                    if (s.y > h + 2) s.y = -2;
                }
                requestAnimationFrame(draw);
            }

            resize();
            seed();
            requestAnimationFrame(draw);

            window.addEventListener('resize', function() {
                resize();
                seed();
            });
        })();
    </script>

    <script>
        // ── Typewriter effect ─────────────────────
        (function() {
            var phrases = [
                "show you how it works.",
                "tell you what went wrong.",
                "write it down.",
                "carry it forward.",
                "do the work.",
                "build things that last.",
                "sit with you.",
                "listen first.",
                "ask the hard question.",
                "push back.",
                "reconsider.",
                "pass the baton.",
                "find a way.",
                "rest."
            ];

            var el = document.getElementById('typewriter-text');
            if (!el) return;

            var prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
            if (prefersReduced) {
                el.textContent = phrases[Math.floor(Math.random() * phrases.length)];
                return;
            }

            // Shuffle using Fisher-Yates
            function shuffle(arr) {
                var a = arr.slice();
                for (var i = a.length - 1; i > 0; i--) {
                    var j = Math.floor(Math.random() * (i + 1));
                    var tmp = a[i];
                    a[i] = a[j];
                    a[j] = tmp;
                }
                return a;
            }

            var queue = [];
            var phraseIndex = 0;

            function getNext() {
                if (phraseIndex >= queue.length) {
                    queue = shuffle(phrases);
                    phraseIndex = 0;
                }
                return queue[phraseIndex++];
            }

            function typePhrase(phrase, cb) {
                var i = 0;
                function typeChar() {
                    if (i < phrase.length) {
                        el.textContent = phrase.substring(0, i + 1);
                        i++;
                        setTimeout(typeChar, 50);
                    } else {
                        setTimeout(cb, 2500);
                    }
                }
                typeChar();
            }

            function deletePhrase(cb) {
                var text = el.textContent;
                var i = text.length;
                function deleteChar() {
                    if (i > 0) {
                        i--;
                        el.textContent = text.substring(0, i);
                        setTimeout(deleteChar, 30);
                    } else {
                        setTimeout(cb, 300);
                    }
                }
                deleteChar();
            }

            function cycle() {
                var phrase = getNext();
                typePhrase(phrase, function() {
                    deletePhrase(cycle);
                });
            }

            // Start after a brief pause
            setTimeout(cycle, 800);
        })();
    </script>

    <script>
    (function() {
      var el = document.getElementById('book-countdown');
      if (!el) return;
      var bookDate = new Date('2026-06-28T00:00:00').getTime();
      function tick() {
        var now = Date.now();
        var diff = bookDate - now;
        if (diff <= 0) { el.textContent = 'the book is here'; return; }
        var days = Math.floor(diff / 86400000);
        var hours = Math.floor((diff % 86400000) / 3600000);
        var mins = Math.floor((diff % 3600000) / 60000);
        var secs = Math.floor((diff % 60000) / 1000);
        el.textContent = days + 'd ' + hours + 'h ' + mins + 'm ' + secs + 's';
      }
      tick();
      setInterval(tick, 1000);
    })();
    </script>
