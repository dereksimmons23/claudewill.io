<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E40AF;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#1E3A8A;stop-opacity:0.9" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="800" fill="url(#bgGradient)" />
  
  <!-- Flint Hills silhouette -->
  <path d="M0,500 Q100,450 200,470 Q300,490 400,450 Q500,410 600,440 Q700,470 800,430 Q900,390 1000,420 Q1100,450 1200,400 L1200,800 L0,800 Z" fill="#0F172A" opacity="0.7" />
  
  <!-- Text overlay for placeholder -->
  <text x="600" y="400" font-family="Arial, sans-serif" font-size="40" text-anchor="middle" fill="white">Flint Hills Landscape</text>
</svg>